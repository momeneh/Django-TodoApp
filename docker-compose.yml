version: '3.8'

services:
 
  web:
    build: .
    container_name: django_app
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./core:/app
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=${SECRET_KEY:-django-insecure-change-this-in-production}
      - DEBUG=${DEBUG:-True}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0}
      - DB_ENGINE=${DB_ENGINE:-mysql}
      - DB_NAME=${DB_NAME:-django_db}
      - DB_USER=${DB_USER:-django_user}
      - DB_PASSWORD=${DB_PASSWORD:-django_password}
      - DB_HOST=${DB_HOST:-db}
      - DB_PORT=${DB_PORT:-3306}
    env_file:
      - .env
    restart: unless-stopped


  smtp4dev:
      container_name: django_smtp4dev
      image: rnwood/smtp4dev:v3
      restart: on-failure
      ports:
        # Change the number before : to the port the web interface should be accessible on
        # Add 127.0.0.1: prefix for localhost-only access (recommended for security)
        - '5001:80'
        # Change the number before : to the port the SMTP server should be accessible on
        # Add 127.0.0.1: prefix for localhost-only access (recommended for security)
        - '25:25'
        # Change the number before : to the port the IMAP server should be accessible on
        # Add 127.0.0.1: prefix for localhost-only access (recommended for security)
        - '143:143'
        # Change the number before : to the port the POP3 server should be accessible on
        # Add 127.0.0.1: prefix for localhost-only access (recommended for security)
        - '110:110'
      volumes:
        # This is where smtp4dev stores the database..
          - smtp4dev-data:/smtp4dev

volumes:
    smtp4dev-data: